name: Build

on:
  push:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # Akcje przypięte po SHA (nie po ruchomym tagu @v4) — ochrona łańcucha dostaw CI.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore MppViewer.sln

      - name: Test
        run: dotnet test MppViewer.sln --no-restore --verbosity normal

      - name: Publish
        run: >
          dotnet publish src/MppViewer/MppViewer.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:EnableCompressionInSingleFile=true
          -o publish/

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mpp-viewer-win-x64
          path: publish/MppViewer.exe
          retention-days: 30
